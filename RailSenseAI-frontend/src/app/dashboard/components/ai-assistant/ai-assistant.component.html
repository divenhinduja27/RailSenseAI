<div class="page">

<button routerLink="/dashboard" class="back-btn">
⬅ Back
</button>

<h2>AI Railway Assistant</h2>

<input
type="text"
[(ngModel)]="query"
placeholder="Ask railway question"
class="ai-input"
/>

<button (click)="askAI()" class="ask-btn">
Ask
</button>

<p class="response">
{{response}}
</p>

</div>
